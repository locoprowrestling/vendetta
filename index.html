    function useCountdown(targetISO) {
      const target = useMemo(() => new Date(targetISO).getTime(), [targetISO]);
      const [now, setNow] = useState(Date.now());
      useEffect(() => {
        const id = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(id);
      }, []);
      const diff = Math.max(0, target - now);
      const total = Math.floor(diff / 1000);
      return {
        days: Math.floor(total / 86400),
        hours: Math.floor((total % 86400) / 3600),
        minutes: Math.floor((total % 3600) / 60),
        seconds: total % 60,
        done: diff <= 0,
      };
    }

    function CTA({ href, children, variant = "primary" }) {
      const classes = ["btn"];
      if (variant === "ghost") classes.push("btn--ghost");
      else if (variant === "outline") classes.push("btn--outline-dark");
      else classes.push("btn--primary");
      return (
        <a href={href} className={classes.join(" ")}>
          {children}
        </a>
      );
    }

    function SocialLinks({ tone = "dark", className = "" }) {
      const classes = [
        "social-list",
        tone === "light" ? "social-list--light" : "social-list--dark",
        className
      ].filter(Boolean);
      return (
        <div className={classes.join(" ")}>
          {SOCIAL_LINKS.map(({ href, icon, label }) => (
            <a key={href} href={href} target="_blank" rel="noopener noreferrer">
              <img src={icon} alt="" aria-hidden="true" />
              <span className="sr-only">{label}</span>
            </a>
          ))}
        </div>
      );
    }

    function CursorLogo({ src }) {
      const [position, setPosition] = useState({ x: null, y: null });

      useEffect(() => {
        if (typeof window === "undefined") {
          return undefined;
        }
        let frame = 0;
        let lastCoords = null;
        const prefersReducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (prefersReducedMotion) {
          return undefined;
        }

        const update = () => {
          if (lastCoords) {
            setPosition(lastCoords);
            frame = 0;
            lastCoords = null;
          }
        };

        const handleMove = (event) => {
          if (event.pointerType === "touch") return;
          lastCoords = { x: event.clientX, y: event.clientY };
          if (!frame) {
            frame = requestAnimationFrame(update);
          }
        };

        const moveEvent = "PointerEvent" in window ? "pointermove" : "mousemove";
        window.addEventListener(moveEvent, handleMove, { passive: true });
        return () => {
          window.removeEventListener(moveEvent, handleMove);
          if (frame) {
            cancelAnimationFrame(frame);
          }
        };
      }, []);

      if (position.x === null || position.y === null) {
        return null;
      }

      return (
        <img
          src={src}
          alt=""
          aria-hidden="true"
          style={{
            position: "fixed",
            top: `${position.y}px`,
            left: `${position.x}px`,
            width: "80px",
            maxWidth: "20vw",
            transform: `translate(${CURSOR_OFFSET.x}px, ${CURSOR_OFFSET.y}px)`,
            pointerEvents: "none",
            userSelect: "none",
            zIndex: 1000,
            transition: "transform 0.06s linear",
            willChange: "transform"
          }}
        />
      );
    }

    function EmailCapture() {
      const [status, setStatus] = useState("idle");
      const honeypotStyle = {
        position: "absolute",
        left: "-10000px",
        top: "auto",
        width: "1px",
        height: "1px",
        overflow: "hidden"
      };

      function onSubmit(e) {
        e.preventDefault();
        const fd = new FormData(e.currentTarget);
        const website = String(fd.get("website") || "").trim();
        if (website) {
          e.currentTarget.reset();
          setStatus("idle");
          return;
        }
        const email = String(fd.get("email") || "").trim();
        if (!email || !email.includes("@")) {
          setStatus("err");
          return;
        }
        const subject = encodeURIComponent("LoCo Pro Wrestling newsletter signup");
        const body = encodeURIComponent(`Please add ${email} to the newsletter list.`);
        window.location.href = `${LINKS.email}?subject=${subject}&body=${body}`;
        setStatus("ok");
        e.currentTarget.reset();
      }

      return (
        <section className="section">
          <div className="container">
            <div className="email-card">
              <div>
                <h2 className="section__title">Don’t miss the bell.</h2>
                <p className="section__description" style={{ color: "rgba(255, 255, 255, 0.75)" }}>
                  Get show updates, roster reveals, and behind-the-scenes.
                </p>
              </div>
              <form className="email-card__form" onSubmit={onSubmit}>
                <div style={honeypotStyle} aria-hidden="true">
                  <label htmlFor="newsletter-website">Website</label>
                  <input
                    id="newsletter-website"
                    type="text"
                    name="website"
                    tabIndex={-1}
                    autoComplete="off"
                  />
                </div>
                <input
                  className="email-card__input"
                  type="email"
                  name="email"
                  placeholder="you@example.com"
                  required
                />
                <button type="submit" className="btn btn--primary">Sign up</button>
              </form>
            </div>
            {status === "ok" && (
              <p className="email-card__message" style={{ color: "#084f2a", marginTop: "18px" }}>
                Thanks! Check your inbox to confirm your subscription.
              </p>
            )}
            {status === "err" && (
              <p className="email-card__message" style={{ color: "#6b0f21", marginTop: "18px" }}>
                Please enter a valid email address.
              </p>
            )}
          </div>
        </section>
      );
    }
