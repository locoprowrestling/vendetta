<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>LoCo Pro Wrestling — Support Us</title>
  <meta name="description" content="Support LoCo Pro Wrestling through Patreon, official merch stores, full match replays, and music links." />
  <link rel="icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="theme-color" content="#000000" />
  <link rel="stylesheet" href="css/site.css" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useEffect, useState } = React;

    const LINKS = {
      home: "index.html",
      story: "story.html",
      pressRelease: "pr/PR-LoCo-Pro-Wrestling-Vendetta-at-the-Opera-House-2026.html",
      ticket: "https://www.eventbrite.com/e/vendetta-at-the-opera-house-tickets-1981065204355",
      history: "history.html",
      sponsors: "sponsors.html",
      support: "support.html",
      privacy: "privacy.html",
      terms: "terms.html",
      patreon: "https://patreon.com/LoCoProWrestling",
      pwt: "https://www.prowrestlingtees.com/locoprowrestling",
      teepublic: "https://www.teepublic.com/user/locoprowrestling",
      playlist: "https://bit.ly/BattleAtTheOperaHouse",
      spotify: "https://bit.ly/LoCoProSpotify",
      appleMusic: "https://bit.ly/LoCoProAppleMusic",
      youtube: "https://www.youtube.com/@locoprowrestling",
      email: "mailto:biz@locopro.pw",
    };

    const SOCIAL_LINKS = [
      { href: "https://youtube.com/@locoprowrestling", icon: "social-icons/youtube-icon.png", label: "YouTube" },
      { href: "https://instagram.com/locoprowrestling", icon: "social-icons/instagram-icon.png", label: "Instagram" },
      { href: "https://x.com/LoCoProWrestlng", icon: "social-icons/x-icon.png", label: "X" },
      { href: "https://tiktok.com/@locoprowrestling", icon: "social-icons/tiktok-icon.png", label: "TikTok" },
      { href: "https://locoprowrestling.bsky.social", icon: "social-icons/bluesky-icon.png", label: "Bluesky" },
      { href: "https://threads.com/@locoprowrestling", icon: "social-icons/threads-icon.png", label: "Threads" },
      { href: "https://www.reddit.com/r/Longmont", icon: "social-icons/reddit-icon.png", label: "Reddit" },
      { href: "https://www.twitch.tv/locoprowrestling", icon: "social-icons/twitch-icon.png", label: "Twitch" },
      { href: "https://streamlabs.com/locoprowrestling", icon: "social-icons/streamlabs-icon.png", label: "Streamlabs" },
      { href: "https://patreon.com/LoCoProWrestling", icon: "social-icons/patreon-icon.png", label: "Patreon" },
    ];

    const SHOP_LINKS = [
      {
        title: "Patreon",
        body: "Keep LoCo Pro independent and story-driven by backing us monthly.",
        href: LINKS.patreon,
        image: "webimages/loco-patreon.png",
        label: "Support us on Patreon"
      },
      {
        title: "Pro Wrestling Tees",
        body: "Official LoCo Pro merchandise from our Pro Wrestling Tees storefront.",
        href: LINKS.pwt,
        image: "webimages/pwt-preview.png",
        label: "Visit Pro Wrestling Tees"
      },
      {
        title: "TeePublic",
        body: "More official LoCo Pro merchandise in the TeePublic store.",
        href: LINKS.teepublic,
        image: "webimages/teepublic-preview.png",
        label: "Visit TeePublic"
      },
    ];

    const MEDIA_LINKS = [
      {
        title: "Full matches playlist",
        body: "Watch complete battles and relive Battle at the Opera House moments.",
        href: LINKS.playlist,
        image: "webimages/LOGO-YouTube.png",
        label: "Open full matches playlist"
      },
      {
        title: "LoCo Pro on Spotify",
        body: "Listen to LoCo Pro music on Spotify.",
        href: LINKS.spotify,
        image: "webimages/LOGO-Spotify.png",
        label: "Open Spotify"
      },
      {
        title: "LoCo Pro on Apple Music",
        body: "Listen to LoCo Pro music on Apple Music.",
        href: LINKS.appleMusic,
        image: "webimages/LOGO-AppleMusic.png",
        label: "Open Apple Music"
      },
    ];

    const LOGO_URL = "webimages/locopro-logo.png";
    const HERO_BG_URL = "webimages/support-banner.jpg";
    const CURSOR_OFFSET = { x: -2, y: -2 };

    function CTA({ href, children, variant = "primary", external = false }) {
      const classes = ["btn"];
      if (variant === "ghost") classes.push("btn--ghost");
      else if (variant === "outline") classes.push("btn--outline-dark");
      else classes.push("btn--primary");

      const extraProps = external
        ? { target: "_blank", rel: "noopener noreferrer" }
        : {};

      return (
        <a href={href} className={classes.join(" ")} {...extraProps}>
          {children}
        </a>
      );
    }

    function SocialLinks({ tone = "dark", className = "" }) {
      const classes = [
        "social-list",
        tone === "light" ? "social-list--light" : "social-list--dark",
        className
      ].filter(Boolean);
      return (
        <div className={classes.join(" ")}>
          {SOCIAL_LINKS.map(({ href, icon, label }) => (
            <a key={href} href={href} target="_blank" rel="noopener noreferrer">
              <img src={icon} alt="" aria-hidden="true" />
              <span className="sr-only">{label}</span>
            </a>
          ))}
        </div>
      );
    }

    function CursorLogo({ src }) {
      const [position, setPosition] = useState({ x: null, y: null });

      useEffect(() => {
        if (typeof window === "undefined") {
          return undefined;
        }
        let frame = 0;
        let lastCoords = null;
        const prefersReducedMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (prefersReducedMotion) {
          return undefined;
        }

        const update = () => {
          if (lastCoords) {
            setPosition(lastCoords);
            frame = 0;
            lastCoords = null;
          }
        };

        const handleMove = (event) => {
          if (event.pointerType === "touch") return;
          lastCoords = { x: event.clientX, y: event.clientY };
          if (!frame) {
            frame = requestAnimationFrame(update);
          }
        };

        window.addEventListener("pointermove", handleMove);
        return () => {
          window.removeEventListener("pointermove", handleMove);
          if (frame) {
            cancelAnimationFrame(frame);
          }
        };
      }, []);

      if (!position || position.x === null) return null;

      return (
        <img
          src={src}
          alt=""
          aria-hidden="true"
          style={{
            position: "fixed",
            top: `${position.y}px`,
            left: `${position.x}px`,
            width: "80px",
            maxWidth: "20vw",
            transform: `translate(${CURSOR_OFFSET.x}px, ${CURSOR_OFFSET.y}px)`,
            pointerEvents: "none",
            userSelect: "none",
            zIndex: 1000,
            transition: "transform 0.06s linear",
            willChange: "transform"
          }}
        />
      );
    }

    function Nav() {
      return (
        <header className="site-header">
          <div className="container site-header__inner">
            <a href={LINKS.home} className="site-header__brand">
              <img src={LOGO_URL} alt="LoCo Pro Wrestling logo" width="44" height="44" />
              <span>LoCo Pro Wrestling</span>
            </a>
            <nav className="site-nav">
              <CTA href={LINKS.ticket}>Tickets</CTA>
              <CTA href={LINKS.support} variant="ghost">Support</CTA>
              <CTA href={LINKS.sponsors} variant="ghost">Sponsors</CTA>
              <CTA href={LINKS.youtube} variant="ghost" external>YouTube</CTA>
            </nav>
          </div>
        </header>
      );
    }

    function Hero() {
      return (
        <section className="hero" style={{ backgroundImage: `url(${HERO_BG_URL})` }}>
          <div className="hero__inner">
            <div className="hero__pill">Support LoCo Pro Wrestling</div>
            <h1 className="hero__title">Fuel the next chapter.</h1>
            <p className="hero__copy">
              Your support helps us fund talent, production, and hometown wrestling storytelling in Longmont.
            </p>
            <div className="hero__actions">
              <CTA href={LINKS.patreon} variant="ghost" external>Support on Patreon</CTA>
              <CTA href={LINKS.pwt} variant="ghost" external>Shop Pro Wrestling Tees</CTA>
            </div>
          </div>
        </section>
      );
    }

    function ShopSupport() {
      return (
        <section className="section">
          <div className="container">
            <div className="section__header section__header--split">
              <div>
                <p className="section__eyebrow">Support channels</p>
                <h2 className="section__title">Back us. Wear us. Rep Longmont.</h2>
              </div>
              <p className="section__description">
                Choose the support path that fits you best and keep LoCo Pro Wrestling moving.
              </p>
            </div>
            <div className="values-grid">
              {SHOP_LINKS.map((item) => (
                <article key={item.title} className="value-card">
                  {item.image ? (
                    <img
                      className="value-card__image"
                      src={item.image}
                      alt={`${item.title} LoCo Pro preview`}
                      loading="lazy"
                      style={{ aspectRatio: "16 / 9", objectFit: "cover" }}
                    />
                  ) : null}
                  <h3>{item.title}</h3>
                  <p>{item.body}</p>
                  <div className="story-card__actions">
                    <a className="story-link" href={item.href} target="_blank" rel="noopener noreferrer">
                      {item.label}
                    </a>
                  </div>
                </article>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function WatchAndListen() {
      return (
        <section className="section section--muted">
          <div className="container">
            <div className="section__header">
              <div>
                <p className="section__eyebrow">Watch and listen</p>
                <h2 className="section__title">Catch the action anywhere.</h2>
                <p className="section__description">
                  Stream full matches and soundtrack your day with official LoCo Pro music.
                </p>
              </div>
            </div>
            <div className="highlight-grid" style={{ marginTop: "40px" }}>
              {MEDIA_LINKS.map((item) => (
                <article key={item.title} className="highlight-card">
                  {item.image ? (
                    <img
                      className="value-card__image"
                      src={item.image}
                      alt={`${item.title} logo`}
                      loading="lazy"
                      style={{ aspectRatio: "1 / 1", objectFit: "contain", background: "#d8d8d8" }}
                    />
                  ) : null}
                  <h3>{item.title}</h3>
                  <p>{item.body}</p>
                  <div className="story-card__actions">
                    <a className="story-link" href={item.href} target="_blank" rel="noopener noreferrer">
                      {item.label}
                    </a>
                  </div>
                </article>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function ContactCallout() {
      return (
        <section className="section section--dark">
          <div className="container">
            <div className="email-card">
              <div>
                <h2 className="section__title">Need a custom way to support?</h2>
                <p className="email-card__message">
                  Reach out for sponsorships, partnerships, and collaboration requests.
                </p>
              </div>
              <CTA href={LINKS.email} variant="primary">Email biz@locopro.pw</CTA>
            </div>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="footer">
          <div className="container">
            <div className="footer__grid">
              <div>
                <div className="footer__heading">LoCo Pro Wrestling</div>
                <p className="section__description" style={{ color: "rgba(255, 255, 255, 0.7)" }}>
                  Longmont’s homegrown pro wrestling project.
                </p>
                <SocialLinks tone="dark" className="footer__socials" />
              </div>
              <div>
                <div className="footer__heading">Event</div>
                <ul className="footer__links">
                  <li>Sat, Mar 7, 2026</li>
                  <li>Dickens Opera House</li>
                  <li>Doors 5:00 • Bell 6:15</li>
                </ul>
              </div>
              <div>
                <div className="footer__heading">Links</div>
                <div className="footer__links">
                  <a href={LINKS.ticket}>Tickets</a>
                  <a href={LINKS.support}>Support</a>
                  <a href={LINKS.sponsors}>Sponsors</a>
                  <a href={LINKS.youtube}>YouTube</a>
                  <a href={LINKS.privacy}>Privacy Policy</a>
                  <a href={LINKS.terms}>Terms of Service</a>
                  <a href={LINKS.story}>The Story</a>
                  <a href={LINKS.pressRelease}>Press Release</a>
                </div>
              </div>
              <div>
                <div className="footer__heading">Contact</div>
                <div className="footer__links">
                  <a href={LINKS.email}>biz@locopro.pw</a>
                </div>
              </div>
            </div>
            <div className="footer__meta">© {new Date().getFullYear()} LoCo Pro Wrestling LLC</div>
          </div>
        </footer>
      );
    }

    function SupportPage() {
      return (
        <>
          <Nav />
          <main>
            <Hero />
            <ShopSupport />
            <WatchAndListen />
            <ContactCallout />
          </main>
          <Footer />
          <CursorLogo src={LOGO_URL} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<SupportPage />);
  </script>
</body>
</html>
